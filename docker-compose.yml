services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: krispy
      POSTGRES_PASSWORD: krispy
      POSTGRES_DB: krispy
    ports:
      - "5432:5432"
    volumes:
      - krispy_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  krispy_postgres:
